server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /bej3

spring:
  datasource:
    url: "jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true"
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  
  sql:
    init:
      mode: never

  web:
    cors:
      allowed-origins: "${CORS_ALLOWED_ORIGINS}"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    stomp:
      port: ${RABBITMQ_STOMP_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}


firebase:
  config:
    service-account-key-path: classpath:datn-d21-firebase-adminsdk-fbsvc-d2772bc9ae.json
    project-id: ${FIREBASE_PROJECT_ID}
    database-url: ${FIREBASE_DATABASE_URL}
    storage-bucket: ${FIREBASE_STORAGE_BUCKET}
      
jwt:
  signerKey: ${JWT_SIGNER_KEY}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

vnpay:
  payUrl: ${VNPAY_PAY_URL}
  returnUrl: ${VNPAY_RETURN_URL}
  ipnUrl: ${VNPAY_IPN_URL}
  tmnCode: ${VNPAY_TMN_CODE}
  hashSecret: ${VNPAY_HASH_SECRET}

zalopay:
  appId: ${ZALOPAY_APP_ID}
  key1: ${ZALOPAY_KEY1}
  key2: ${ZALOPAY_KEY2}
  createOrderUrl: ${ZALOPAY_CREATE_ORDER_URL}
  callbackUrl: ${ZALOPAY_CALLBACK_URL}
  returnUrl: ${ZALOPAY_RETURN_URL}